name: github_pusher
description: "GitHub Pusher — заливай файлы, отслеживай Actions и скачивай APK прямо с телефона."
publish_to: 'none'
version: 1.9.9+72

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  http: ^1.2.2
  shared_preferences: ^2.3.2
  archive: ^3.6.1
  file_picker: ^8.1.2
  intl: ^0.19.0
  url_launcher: ^6.3.0
  path_provider: ^2.1.4
  share_plus: ^10.0.2
  photo_manager: ^3.5.2
  flutter_local_notifications: ^17.2.1+2
  # Lottie-стикеры (cloud / robot / bag / lock) удалены из онбординга:
  # они давали лаги при свайпе PageView (большие .tgs JSON, тяжёлый
  # paint анимированных путей) и визуально были «дёрганые». Теперь
  # на онбординге используются обычные Solar SVG-иконки из
  # assets/icons/, которые прогреваются в svg.cache на старте.
  # crypto уже подтягивается транзитивно (http→...→crypto), фиксируем
  # как явную зависимость, потому что используем `sha1.convert(...)`
  # напрямую в api.pushFiles для расчёта git blob SHA локально и
  # сравнения с remote tree — это позволяет пушить только изменённые
  # или новые файлы, а не всё подряд.
  crypto: ^3.0.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
